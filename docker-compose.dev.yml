services:
  nginx:
    ports:
      - "${PUBLIC_HTTP_PORT:-3000}:3000"

  backend:
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      LOG_LEVEL: debug
    ports:
      - "${BACKEND_DEV_PORT:-8000}:8000"
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    build:
      context: ./mobile
      dockerfile: Dockerfile
