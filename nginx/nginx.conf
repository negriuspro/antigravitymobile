worker_processes auto;
worker_rlimit_nofile 65535;
# P-nginx-1: pid en /var/run que está en tmpfs — necesario con read_only:true
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    reset_timedout_connection on;

    # Paths de temp en /var/cache/nginx (montado como tmpfs en compose)
    # Necesario con read_only:true para que nginx pueda escribir buffers
    client_body_temp_path /var/cache/nginx/client_temp;
    proxy_temp_path       /var/cache/nginx/proxy_temp;
    fastcgi_temp_path     /var/cache/nginx/fastcgi_temp;
    uwsgi_temp_path       /var/cache/nginx/uwsgi_temp;
    scgi_temp_path        /var/cache/nginx/scgi_temp;

    # ── Security ─────────────────────────────────────────────────────────────
    server_tokens off;

    # ── Logging ──────────────────────────────────────────────────────────────
    # Las rutas /var/log/nginx/*.log en nginx:alpine son symlinks a /dev/stdout
    # y /dev/stderr — los logs van al driver json-file de Docker (con rotación)
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time rid=$request_id';

    access_log /var/log/nginx/access.log main buffer=16k flush=5s;
    # P10-FIX: nivel error en producción — warn genera demasiado volumen
    error_log  /var/log/nginx/error.log error;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        application/javascript
        application/json
        application/manifest+json
        application/wasm
        image/svg+xml
        text/css
        text/plain
        text/xml;

    # ── Rate limiting zones ──────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m   rate=60r/m;
    limit_req_zone $binary_remote_addr zone=ws_limit:10m    rate=10r/m;
    limit_req_zone $binary_remote_addr zone=global_limit:10m rate=120r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── WebSocket upgrade map ─────────────────────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    include /etc/nginx/conf.d/*.conf;
}
